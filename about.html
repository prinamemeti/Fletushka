<h1> Mirësevini në Fletushka!</h1>
<p> Fletushka është një faqe ku mund të gjeni shkrime rreth librave. Më
saktësisht, shkrimet janë në lidhje me libra të letërsisë shqipe. Fletushka
synon të jetë një kompenzim për diskutime të veprave në gjuhë shqipe në internet.
Mirë se keni ardhur e mirëmbetshi!</p>
